{% extends "core/base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-4">
        <div class="card">
            <div class="card-header bg-primary text-white">
                <h4 class="mb-0">Nouveau mot de passe</h4>
            </div>
            <div class="card-body">
                {% if validlink %}
                    <form method="post">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label for="id_new_password1" class="form-label">Nouveau mot de passe</label>
                            <input type="password" name="new_password1" class="form-control" id="id_new_password1" required>
                        </div>
                        <div class="mb-3">
                            <label for="id_new_password2" class="form-label">Confirmer le mot de passe</label>
                            <input type="password" name="new_password2" class="form-control" id="id_new_password2" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Changer le mot de passe</button>
                    </form>
                {% else %}
                    <div class="alert alert-danger">
                        Le lien de réinitialisation est invalide ou a expiré.
                    </div>
                    <a href="{% url 'password_reset' %}" class="btn btn-primary w-100">Demander un nouveau lien</a>
                {% endif %}
            </div>
        </div>
    </div>
</div>
{% endblock %}
