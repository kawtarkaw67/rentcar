{% extends "core/base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-4">
        <div class="card">
            <div class="card-header bg-primary text-white">
                <h4 class="mb-0">Mot de passe oublié</h4>
            </div>
            <div class="card-body">
                <p class="text-muted">Entrez votre adresse email pour recevoir un lien de réinitialisation.</p>
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label for="id_email" class="form-label">Email</label>
                        <input type="email" name="email" class="form-control" id="id_email" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Envoyer le lien</button>
                </form>
                <hr>
                <p class="text-center mb-0">
                    <a href="{% url 'login' %}">Retour à la connexion</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
