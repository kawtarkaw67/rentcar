{% extends "core/base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-4">
        <div class="card">
            <div class="card-header bg-primary text-white">
                <h4 class="mb-0">Connexion</h4>
            </div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label for="id_username" class="form-label">Nom d'utilisateur</label>
                        <input type="text" name="username" class="form-control" id="id_username" required>
                    </div>
                    <div class="mb-3">
                        <label for="id_password" class="form-label">Mot de passe</label>
                        <input type="password" name="password" class="form-control" id="id_password" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Se connecter</button>
                </form>
                <hr>
                <p class="text-center mb-1">
                    <a href="{% url 'password_reset' %}" class="text-muted small">Mot de passe oublié ?</a>
                </p>
                <p class="text-center mb-0">
                    Pas encore de compte ? <a href="{% url 'client_register' %}" class="text-success">S'inscrire</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
