{% extends "core/base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-4">
        <div class="card">
            <div class="card-header bg-success text-white">
                <h4 class="mb-0">Email envoyé</h4>
            </div>
            <div class="card-body">
                <p>Si l'adresse email que vous avez saisie correspond à un compte existant, vous recevrez un lien de réinitialisation dans quelques instants.</p>
                <p class="text-muted small">Pensez à vérifier vos spams si vous ne le recevez pas.</p>
                <a href="{% url 'login' %}" class="btn btn-primary w-100">Retour à la connexion</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
